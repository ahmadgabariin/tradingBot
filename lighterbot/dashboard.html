<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LighterBot — Real Trading</title>
<style>
  body { background:#0d1117; color:#e6edf3; font-family: -apple-system, Segoe UI, sans-serif; margin:0; padding:20px; }
  h1 { color:#ff6b6b; }
  .warn { background:#3d1f1f; border:1px solid #ff6b6b; padding:10px 15px; border-radius:8px; margin-bottom:20px; }
  .card { background:#161b22; border:1px solid #30363d; border-radius:10px; padding:16px; margin-bottom:16px; }
  .row { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
  label { font-size:13px; color:#8b949e; }
  input, select, button { background:#0d1117; color:#e6edf3; border:1px solid #30363d; border-radius:6px; padding:6px 10px; }
  button { cursor:pointer; }
  button.primary { background:#238636; border-color:#238636; }
  button.danger { background:#da3633; border-color:#da3633; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  td, th { padding:6px 10px; border-bottom:1px solid #30363d; text-align:left; }
  #log { background:#000; color:#0f0; font-family:monospace; font-size:12px; padding:10px; height:200px; overflow-y:scroll; border-radius:8px; }
  .agent-row { display:flex; gap:10px; align-items:center; padding:8px 0; border-bottom:1px solid #30363d; }
  .badge { padding:2px 8px; border-radius:10px; font-size:11px; }
  .on { background:#238636; }
  .off { background:#444; }
</style>
</head>
<body>
<h1>⚡ LighterBot — Real Money, Real Leverage</h1>
<div class="warn">This bot places real orders with real leverage on Lighter. Test with /selftest before relying on it.</div>

<div class="card">
  <div class="row">
    <strong>Balance:</strong> <span id="balance">--</span>
    <strong>Status:</strong> <span id="running-badge" class="badge off">STOPPED</span>
    <button class="primary" onclick="startBot()">Start</button>
    <button class="danger" onclick="stopBot()">Stop</button>
    <button onclick="selftest()">Run Self-Test</button>
  </div>
</div>

<div class="card">
  <h3>Agents</h3>
  <div id="agents"></div>
</div>

<div class="card">
  <h3>Sizing</h3>
  <div class="row">
    <label>Mode</label>
    <select id="sizing-mode">
      <option value="percent">% of balance</option>
      <option value="fixed">Fixed USD</option>
    </select>
    <label>Percent</label><input id="sizing-percent" type="number" step="0.1" style="width:70px">
    <label>Fixed USD</label><input id="sizing-fixed" type="number" step="0.1" style="width:70px">
    <button onclick="saveSizing()">Save</button>
  </div>
</div>

<div class="card">
  <h3>Leverage per symbol</h3>
  <div class="row" id="leverage-row"></div>
  <button onclick="saveLeverage()">Save Leverage</button>
</div>

<div class="card">
  <h3>Manual Test Trade</h3>
  <div class="row">
    <select id="m-agent"><option>Liquidity Hunt</option><option>Surgeon v2</option></select>
    <select id="m-symbol"><option>BTC</option><option>ETH</option><option>SOL</option></select>
    <select id="m-side"><option>LONG</option><option>SHORT</option></select>
    <label>Override margin USD (optional, e.g. 0.5)</label>
    <input id="m-usd" type="number" step="0.1" style="width:80px">
    <button class="danger" onclick="manualTrade()">Place Real Trade</button>
  </div>
</div>

<div class="card">
  <h3>Open Positions</h3>
  <table id="positions"><thead><tr><th>Agent</th><th>Symbol</th><th>Side</th><th>Entry</th><th>SL</th><th>TP</th><th>Amount</th></tr></thead><tbody></tbody></table>
</div>

<div class="card">
  <h3>Log</h3>
  <div id="log"></div>
</div>

<script>
let pwd = sessionStorage.getItem('lb_pwd') || '';

async function authFetch(url, opts={}) {
  if (!pwd) { pwd = prompt('Dashboard password:'); if (!pwd) return; sessionStorage.setItem('lb_pwd', pwd); }
  const headers = {...(opts.headers||{}), 'X-Action-Password': pwd, 'Content-Type':'application/json'};
  const res = await fetch(url, {...opts, headers});
  if (res.status === 403) { sessionStorage.removeItem('lb_pwd'); pwd=''; alert('Wrong password'); return; }
  return res;
}

async function refresh() {
  const res = await fetch('/state');
  const d = await res.json();
  document.getElementById('balance').textContent = d.balance_usd != null ? `$${d.balance_usd.toFixed(2)}` : (d.balance_error || '--');
  const badge = document.getElementById('running-badge');
  badge.textContent = d.running ? 'RUNNING' : 'STOPPED';
  badge.className = 'badge ' + (d.running ? 'on' : 'off');

  const agentsDiv = document.getElementById('agents');
  agentsDiv.innerHTML = '';
  for (const [name, acfg] of Object.entries(d.config.agents)) {
    const row = document.createElement('div');
    row.className = 'agent-row';
    row.innerHTML = `
      <strong style="width:160px">${name}</strong>
      <label><input type="checkbox" ${acfg.enabled?'checked':''} onchange="toggleAgent('${name}', this.checked)"> Enabled</label>
      <select onchange="setDirection('${name}', this.value)">
        <option value="LONG" ${acfg.direction==='LONG'?'selected':''}>LONG only</option>
        <option value="SHORT" ${acfg.direction==='SHORT'?'selected':''}>SHORT only</option>
        <option value="BOTH" ${acfg.direction==='BOTH'?'selected':''}>BOTH</option>
      </select>`;
    agentsDiv.appendChild(row);
  }

  document.getElementById('sizing-mode').value = d.config.sizing.mode;
  document.getElementById('sizing-percent').value = d.config.sizing.percent;
  document.getElementById('sizing-fixed').value = d.config.sizing.fixed_usd;

  const levRow = document.getElementById('leverage-row');
  levRow.innerHTML = '';
  for (const [sym, lev] of Object.entries(d.config.leverage)) {
    levRow.innerHTML += `<label>${sym}</label><input id="lev-${sym}" type="number" value="${lev}" style="width:60px">`;
  }

  const tbody = document.querySelector('#positions tbody');
  tbody.innerHTML = '';
  for (const [key, pos] of Object.entries(d.open_positions)) {
    tbody.innerHTML += `<tr><td>${pos.agent}</td><td>${pos.symbol}</td><td>${pos.side}</td><td>${pos.entry}</td><td>${pos.sl}</td><td>${pos.tp}</td><td>${pos.base_amount}</td></tr>`;
  }

  const log = document.getElementById('log');
  log.innerHTML = d.trade_log.map(l => `<div>${l}</div>`).join('');
  log.scrollTop = log.scrollHeight;
}

async function toggleAgent(name, enabled) {
  await authFetch('/config', {method:'POST', body: JSON.stringify({agents:{[name]:{enabled}}})});
  refresh();
}
async function setDirection(name, direction) {
  await authFetch('/config', {method:'POST', body: JSON.stringify({agents:{[name]:{direction}}})});
  refresh();
}
async function saveSizing() {
  await authFetch('/config', {method:'POST', body: JSON.stringify({sizing:{
    mode: document.getElementById('sizing-mode').value,
    percent: parseFloat(document.getElementById('sizing-percent').value),
    fixed_usd: parseFloat(document.getElementById('sizing-fixed').value),
  }})});
  refresh();
}
async function saveLeverage() {
  const leverage = {};
  document.querySelectorAll('[id^="lev-"]').forEach(el => {
    leverage[el.id.replace('lev-','')] = parseInt(el.value);
  });
  await authFetch('/config', {method:'POST', body: JSON.stringify({leverage})});
  refresh();
}
async function startBot() { await authFetch('/start', {method:'POST'}); refresh(); }
async function stopBot()  { await authFetch('/stop',  {method:'POST'}); refresh(); }
async function selftest() {
  const res = await authFetch('/selftest', {method:'POST'});
  const d = await res.json();
  alert(d.ok ? 'Self-test OK — check log for account field names' : 'Self-test FAILED: ' + d.result);
  refresh();
}
async function manualTrade() {
  if (!confirm('Place a REAL order with real money?')) return;
  const override = document.getElementById('m-usd').value;
  const res = await authFetch('/manual-trade', {method:'POST', body: JSON.stringify({
    agent: document.getElementById('m-agent').value,
    symbol: document.getElementById('m-symbol').value,
    side: document.getElementById('m-side').value,
    override_usd: override ? parseFloat(override) : null,
  })});
  const d = await res.json();
  alert(d.ok ? 'Trade placed: ' + d.result : 'Trade FAILED: ' + d.result);
  refresh();
}

refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
